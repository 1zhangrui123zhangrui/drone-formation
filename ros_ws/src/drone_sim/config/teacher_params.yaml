# Teacher 控制器参数 (论文 §3.3)
# 增益按 PD 控制律对带向心加速度参考的稳态误差理论整定
# 圆周巡航 R=3, ω=0.4: 向心加速度 Rω² = 0.48 m/s²
# 预期稳态位置误差 ≈ Rω² / (kp_h · K_inner) ≈ 0.48 / (2.0 × 5) ≈ 0.05 m

teacher_controller:
  # 水平 PD - kp_h 从 2.0 降至 1.5 以降低 hector_quadrotor NaN 触发概率
  kp_h: 1.5
  kd_h: 1.0
  # 垂直 PD (高度通道权重更高,见论文 §4.5)
  kp_z: 2.5
  kd_z: 1.2
  # 偏航阻尼
  kyaw: 0.5
  # 机间碰撞分离 (论文公式 3.11)
  k_rep: 1.0      # 排斥增益
  d_min: 0.5      # 触发距离 (m); 编队 1.0m 间距下 0.5m 不影响正常编队
  # 控制输出限幅
  umax_xy: 2.5    # 水平速度 (m/s)
  umax_z: 1.5     # 垂直速度 (m/s)
  umax_yaw: 1.5   # 偏航角速度 (rad/s)
  # 起飞保护: 前 N 秒不发布水平指令,只发垂直指令爬升
  takeoff_duration: 3.0